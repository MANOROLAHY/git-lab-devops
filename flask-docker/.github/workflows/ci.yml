name: Flask CI/CD Level 2

on:
  push:
    branches: ["main"]

        jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r flask-docker/requirements.txt
          pip install pytest flake8

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$PWD/flask-docker" >> $GITHUB_ENV

      - name: Run flake8
        working-directory: flask-docker
        run: flake8 .

      - name: Run tests
        working-directory: flask-docker
        run: python -m pytest -v