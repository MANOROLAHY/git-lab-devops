- name: Checkout code
  uses: actions/checkout@v4

- name: Setup Python
  uses: actions/setup-python@v5
  with:
    python-version: "3.12"

- name: Install dependencies
  run: |
    pip install -r flask-docker/requirements.txt
    pip install pytest flake8

- name: Lint
  working-directory: flask-docker
  run: flake8 .

- name: Test
  working-directory: flask-docker
  run: python -m pytest -v